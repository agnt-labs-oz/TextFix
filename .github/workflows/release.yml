name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for SignPath

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Publish
        run: >
          dotnet publish src/TextFix/TextFix.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish

      # SignPath signing of publish/TextFix.exe slots in here once SIGNPATH_ORGANIZATION_ID is set.
      # Project must be configured with an artifact config that accepts a single .exe file.

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta generation)
        continue-on-error: true
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack
        run: >
          vpk pack
          --packId TextFix
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe TextFix.exe
          --packTitle "TextFix"
          --packAuthors "wellsst"
          --icon src/TextFix/Resources/textfix.ico

      # SignPath signing of Releases/TextFix-*-Setup.exe slots in here once SIGNPATH_ORGANIZATION_ID is set.

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --merge
          --releaseName "TextFix ${{ github.ref_name }}"
          --tag ${{ github.ref_name }}
