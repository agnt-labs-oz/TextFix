name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for SignPath

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore

      - name: Publish
        run: >
          dotnet publish src/TextFix/TextFix.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Create unsigned zip (artifact for signing)
        run: Compress-Archive -Path publish/TextFix.exe -DestinationPath TextFix-unsigned.zip

      - name: Sign with SignPath
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: 'TextFix'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'zip-exe'
          input-artifact-path: 'TextFix-unsigned.zip'
          output-artifact-path: 'TextFix-signed.zip'
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 300

      - name: Extract signed exe
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        run: |
          Remove-Item publish/TextFix.exe
          Expand-Archive -Path TextFix-signed.zip -DestinationPath publish -Force

      - name: Create release zip
        run: Compress-Archive -Path publish/TextFix.exe -DestinationPath TextFix-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: TextFix-${{ github.ref_name }}-win-x64.zip
